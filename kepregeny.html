<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Képregény - Pacific Rim</title>
<link rel="stylesheet" href="styles.css">
<script src="script.js" defer></script>
</head>
<body data-page="kepregeny">
<header class="site-header">
  <div class="left"><div class="logo">PACIFIC RIM</div></div>
  <nav class="main-nav" aria-label="Fő navigáció">
    <a href="index.html">Kezdőlap</a>
    <a href="webshop.html">Webshop</a>
    <a href="fandom.html">Fandom</a>
    <a href="bts.html">Behind The Scenes</a>
    <a href="kepregeny.html" class="active">Képregény</a>
    <a href="hirek.html">Hírek</a>
  </nav>
  <div class="user-area">
    <button id="loginBtn" class="btn ghost">Bejelentkezés</button>
    <div id="userMenu" class="user-menu hidden">
      <span id="userName" class="user-name"></span>
      <button id="logoutBtn" class="btn small">Kijelentkezés</button>
    </div>
    <button id="mobileToggle" class="mobile-toggle" aria-label="Menü">☰</button>
  </div>
</header>

<main class="container">
  <section class="comic-section">
    <h2>Képregények - Válogatás az elolvasandók közé</h2>
    
    <!-- Szűrési és nézet opcók -->
    <div class="comic-controls">
      <div class="filter-group">
        <label for="filterSort">Rendezés:</label>
        <select id="filterSort" class="filter-select">
          <option value="name">Név szerinti</option>
          <option value="recent">Frissebb előre</option>
        </select>
      </div>
      <div class="view-group">
        <button id="viewGridBtn" class="view-btn active" aria-pressed="true" title="Rács nézet">⊞</button>
        <button id="viewListBtn" class="view-btn" aria-pressed="false" title="Lista nézet">☰</button>
      </div>
    </div>

    <!-- Kiválasztott számlálók -->
    <div class="selection-stats">
      <span>Kiválasztott: <strong id="selectedCount">0</strong></span>
      <button id="clearAllBtn" class="btn small ghost">Összes törlése</button>
      <button id="viewSelectedBtn" class="btn small">Elolvasandók megtekintése</button>
    </div>

    <!-- Képregény lista -->
    <div id="comicCatalog" class="comic-catalog grid-view">
      <!-- Képregények itt jelennek meg -->
    </div>
  </section>

  <!-- Elolvasandók panel -->
  <div id="selectedPanel" class="selected-panel hidden" role="region" aria-label="Elolvasandó képregények">
    <div class="panel-header">
      <h3>Elolvasandó képregények</h3>
      <button id="closePanel" class="close-btn">✕</button>
    </div>
    <div id="selectedList" class="selected-list">
      <!-- Elolvasandók itt jelennek meg -->
    </div>
    <div class="panel-actions">
      <button id="downloadList" class="btn">Lista exportálása</button>
      <button id="clearList" class="btn ghost">Összes törlése</button>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div>© 2026 Pacific Rim Fan Project</div>
</footer>
</body>
</html>
